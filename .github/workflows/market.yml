name: Market Data Update

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update_market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install --upgrade pip requests pandas numpy
      - name: Execute market update
        env:
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
        run: python market_alert.py
        shell: bash
      - name: Upload logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: run-logs
          path: run.log
