# 名称：全球行情自动更新
name: 全球行情自动更新

# 触发条件
on:
  push:
    branches: [ main, master ]  # 代码仓库主分支
  schedule:
    - cron: '0 * * * *'  # 每小时执行一次（UTC时间）
  workflow_dispatch:  # 手动触发

# 工作流定义
jobs:
  update_market:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 超时10分钟
    
    steps:
    # 1. 检出代码
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # 2. 设置Python环境
    - name: 设置Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 安装依赖（升级到最新版）
    - name: 安装依赖库
      run: |
        pip install --upgrade pip
        pip install --upgrade requests
        pip install --upgrade pyyaml
      shell: bash

    # 4. 执行行情更新
    - name: 执行市场行情更新
      run: |
        echo "开始更新市场行情数据..."
        python market_alert.py
      env:
        SERVER_KEY: ${{ secrets.SERVER_KEY }}  # 从Secrets读取
      shell: bash

    # 5. [可选] 保存运行日志
    - name: 保存运行日志
      if: always()  # 无论成功失败都执行
      run: |
        echo "运行编号: ${{ github.run_number }}"
        echo "工作空间: ${{ github.workspace }}"
        echo "日志已保存至: $LOG_PATH"
      shell: bash
      env:
        LOG_PATH: ${{ github.workspace }}/run.log
