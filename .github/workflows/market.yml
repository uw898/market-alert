name: 🌐 全球行情自动推送

# 触发条件
on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点触发（UTC时间）
  workflow_dispatch:      # 允许手动触发（测试用）
  push:
    branches: [ main, master ]  # 代码推送时也运行（可选）

# 任务定义
jobs:
  market-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 防止卡死
    
    steps:
      # 1. 检出代码
      - name: 📥 检出仓库代码
        uses: actions/checkout@v4
      
      # 2. 设置Python环境
      - name: 🐍 设置Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 3. 安装依赖（升级到最新版）
      - name: 📦 安装依赖库
        run: |
          pip install --upgrade pip
          pip install --upgrade akshare requests
          pip list | grep -E "akshare|requests"  # 验证安装
      
      # 4. 执行推送脚本
      - name: 📤 执行行情推送
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}  # 从Secrets读取
        run: python market_alert.py
      
      # 5. （可选）保存运行日志
      - name: 📝 保存日志到Artifacts
        - uses: actions/upload-artifact@v4
        if: always()  # 即使失败也保存
        with:
          name: run-log-${{ github.run_number }}
          path: ${{ github.workspace }}/run.log
