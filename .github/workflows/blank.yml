# 市场提醒自动工作流
name: Market Alert Auto

# 触发条件
on:
  # 定时触发：每4小时（UTC时间）运行一次
  schedule:
    - cron: '0 */4 * * *'
  # 允许手动触发（在 GitHub Actions 页面点击按钮）
  workflow_dispatch:

# 定义一个名为 'alert' 的任务
jobs:
  alert:
    # 在最新的 Ubuntu 虚拟机上运行
    runs-on: ubuntu-latest

    # 任务的具体步骤
    steps:
      # 步骤1: 检出你的代码仓库到虚拟机
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步骤3: 安装脚本依赖 (requests 库)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 步骤4: 运行 Python 脚本
      - name: Run market alert script
        env:
          # 从 GitHub Secrets 中安全地读取 Server酱密钥
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
        run: python market_alert.py
