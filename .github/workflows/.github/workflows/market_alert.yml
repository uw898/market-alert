name: Market Alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python market_alert.py
        env:
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
